version: '3.8'

# ── Zentto Tickets — Docker Compose (desarrollo local) ──

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: zentto-tickets-api
    ports:
      - "4700:4700"
    environment:
      - PORT=4700
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-change_me}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=zentto_tickets
      - PG_USER=postgres
      - PG_PASSWORD=tickets123
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://host.docker.internal:4600}
      - NOTIFY_URL=${NOTIFY_URL:-https://notify.zentto.net}
      - NOTIFY_API_KEY=${NOTIFY_API_KEY:-}
      - WS_PORT=4701
    depends_on:
      - postgres
      - redis
    networks:
      - tickets-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4700
        NEXT_PUBLIC_AUTH_URL: http://localhost:4600
    container_name: zentto-tickets-frontend
    ports:
      - "3300:3300"
    environment:
      - NODE_ENV=development
      - AUTH_SECRET=${AUTH_SECRET:-change_me_nextauth_secret}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=http://localhost:3300
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://host.docker.internal:4600}
      - NEXT_PUBLIC_API_URL=http://localhost:4700
      - NEXT_PUBLIC_AUTH_URL=http://localhost:4600
    depends_on:
      - api
    networks:
      - tickets-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: zentto-tickets-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: zentto_tickets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tickets123
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tickets-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zentto-tickets-redis
    ports:
      - "6380:6379"
    networks:
      - tickets-net
    restart: unless-stopped

networks:
  tickets-net:
    driver: bridge

volumes:
  pgdata:
