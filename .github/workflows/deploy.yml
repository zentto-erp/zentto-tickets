name: Deploy

on:
  push:
    branches: [main, developer]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "main" ]; then
              TAG="latest"; SUFFIX=""; API_PORT="4700"; FE_PORT="3300"; ENV_DIR="/opt/zentto"
              API_URL="https://tickets-api.zentto.net"; AUTH_URL="https://auth.zentto.net"
              ASSET_PREFIX="https://tickets.zentto.net"
            else
              TAG="dev"; SUFFIX="-dev"; API_PORT="4710"; FE_PORT="3310"; ENV_DIR="/opt/zentto-dev"
              API_URL="https://ticketsapidev.zentto.net"; AUTH_URL="https://authdev.zentto.net"
              ASSET_PREFIX="https://ticketsdev.zentto.net"
            fi

            echo "=== Deploy Zentto Tickets ($TAG) port=$API_PORT/$FE_PORT ==="

            REPO_DIR="/tmp/zentto-tickets-$TAG"
            if [ -d "$REPO_DIR" ]; then
              cd "$REPO_DIR" && git fetch origin && git reset --hard origin/$BRANCH
            else
              git clone -b $BRANCH https://github.com/zentto-erp/zentto-tickets.git "$REPO_DIR"
              cd "$REPO_DIR"
            fi

            docker build -t zentto-tickets-api:$TAG -f docker/Dockerfile.api .
            docker build -t zentto-tickets-frontend:$TAG \
              --build-arg NEXT_PUBLIC_API_URL=$API_URL \
              --build-arg NEXT_PUBLIC_AUTH_URL=$AUTH_URL \
              --build-arg NEXT_PUBLIC_ASSET_PREFIX=$ASSET_PREFIX \
              -f docker/Dockerfile.frontend .

            docker stop zentto-tickets-api$SUFFIX 2>/dev/null || true
            docker rm zentto-tickets-api$SUFFIX 2>/dev/null || true
            docker run -d \
              --name zentto-tickets-api$SUFFIX \
              --restart unless-stopped \
              --network zentto_zentto-net \
              -p ${API_PORT}:4700 \
              --env-file ${ENV_DIR}/.env.tickets-api \
              zentto-tickets-api:$TAG

            docker stop zentto-tickets-frontend$SUFFIX 2>/dev/null || true
            docker rm zentto-tickets-frontend$SUFFIX 2>/dev/null || true
            docker run -d \
              --name zentto-tickets-frontend$SUFFIX \
              --restart unless-stopped \
              --network zentto_zentto-net \
              -p ${FE_PORT}:3300 \
              --env-file ${ENV_DIR}/.env.tickets-frontend \
              zentto-tickets-frontend:$TAG

            sleep 5
            curl -s -o /dev/null -w "API: %{http_code}\n" http://localhost:${API_PORT}/health
            docker image prune -f
            echo "=== Deploy completado ==="
